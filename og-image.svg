<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0f0f0f"/>

  <!-- subtle grid lines -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="0" y1="629" x2="1200" y2="629" stroke="#2a2a2a" stroke-width="1"/>

  <!-- hand-drawn accent marks (far-layer style) -->
  <g stroke="#333" fill="none" stroke-linecap="round" stroke-width="1">
    <circle cx="88"  cy="140" r="2"/>
    <circle cx="152" cy="310" r="1.5"/>
    <circle cx="68"  cy="480" r="2"/>
    <path d="M110 220 h8 M114 216 v8"/>
    <path d="M55  400 h8 M59  396 v8"/>
    <circle cx="1112" cy="160" r="2"/>
    <circle cx="1148" cy="340" r="1.5"/>
    <circle cx="1095" cy="500" r="2"/>
    <path d="M1082 260 h8 M1086 256 v8"/>
    <path d="M1130 440 h8 M1134 436 v8"/>
  </g>

  <!-- heron silhouette — left accent -->
  <g stroke="#555" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2"
     transform="translate(148, 185)">
    <path d="M0,0 Q18,-11 36,0 Q30,14 12,11 Q-3,9 0,0"/>
    <path d="M2,-2 Q-28,-25 -62,-36 Q-90,-44 -110,-34 Q-120,-27 -116,-19"/>
    <path d="M34,0 Q58,-18 88,-25 Q108,-30 120,-20"/>
    <path d="M2,-2 Q-7,-19 -16,-35 Q-23,-48 -28,-57"/>
    <path d="M-28,-57 Q-34,-65 -32,-72 Q-28,-77 -23,-72 Q-21,-65 -28,-57"/>
    <circle cx="-29" cy="-70" r="2.5" fill="#555" stroke="none"/>
  </g>

  <!-- monogram — centre -->
  <text
    x="600" y="270"
    font-family="Georgia, serif"
    font-size="96"
    font-weight="400"
    fill="#e8e8e8"
    text-anchor="middle"
    letter-spacing="-2"
  >Avinash Aldhapati</text>

  <text
    x="600" y="348"
    font-family="-apple-system, 'Inter', sans-serif"
    font-size="26"
    font-weight="300"
    fill="#666"
    text-anchor="middle"
    letter-spacing="4"
  >SOFTWARE ENGINEER</text>

  <!-- divider -->
  <line x1="520" y1="390" x2="680" y2="390" stroke="#2a2a2a" stroke-width="1"/>

  <text
    x="600" y="430"
    font-family="-apple-system, 'Inter', sans-serif"
    font-size="18"
    font-weight="300"
    fill="#444"
    text-anchor="middle"
    letter-spacing="1"
  >avinashaldhapati.com</text>
